server:
  port: ${PORT:8083}
  address: 0.0.0.0
  forward-headers-strategy: framework
spring:
  application:
    name: digital-paper-server-side

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://192.168.10.248:8080}/realms/${KEYCLOAK_REALM:digitalpaper}
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

  datasource:
    url: jdbc:postgresql://${DATABASE_URL:localhost:5432}/${DATABASE_NAME:digitalpaper}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:admin}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  jpa:
    show-sql: true
    generate-ddl: true
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    persist-authorization: true
    oauth:
      client-id: ${KEYCLOAK_CLIENT_ID:digital-paper-api}
      use-pkce-with-authorization-code-grant: true
      scopes: openid profile email

keycloak:
  client:
    server-url: ${KEYCLOAK_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:digitalpaper}
    client-id: ${KEYCLOAK_CLIENT_ID:digital-paper-api}
    client-secret: ${KEYCLOAK_CLIENT_SECRET:PJiX4MOPhYQXqozLGVT0548X3x2AD4Vc}

s3:
  config:
    endpoint: ${S3_ENDPOINT:http://127.0.0.1:9000}
    accessKey: ${S3_ACCESS_KEY:minioadmin}
    secretKey: ${S3_SECRET_KEY:minioadmin}
    publicBucket: ${S3_PUBLIC_BUCKET_NAME:public}
    secureBucket: ${S3_SECURE_BUCKET_NAME:secure}
    presignedExpiryHours: ${S3_EXPIRY_HOURS:1}
